name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset_name: darwin-arm64
          - target: x86_64-apple-darwin
            asset_name: darwin-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i '' "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build coast-guard UI
        run: |
          cd coast-guard
          npm ci
          npm run generate:types
          npm run build

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --workspace --exclude coast-integration-tests

      - name: Strip binaries
        run: |
          strip target/${{ matrix.target }}/release/coast
          strip target/${{ matrix.target }}/release/coastd

      - name: Package tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARBALL="coast-v${VERSION}-${{ matrix.asset_name }}.tar.gz"
          tar czf "${TARBALL}" \
            -C target/${{ matrix.target }}/release \
            coast coastd
          shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256"
          echo "TARBALL=${TARBALL}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            coast-v*.tar.gz
            coast-v*.tar.gz.sha256

  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: linux-amd64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            asset_name: linux-arm64
            use_cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Set version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build coast-guard UI
        run: |
          cd coast-guard
          npm ci
          npm run generate:types
          npm run build

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binaries (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --workspace --exclude coast-integration-tests

      - name: Strip binaries
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            # cross-compiled — use the cross toolchain's strip
            docker run --rm -v "$(pwd)/target/${{ matrix.target }}/release:/work" \
              ghcr.io/cross-rs/${{ matrix.target }}:main \
              bash -c "strip /work/coast /work/coastd" || true
          else
            strip target/${{ matrix.target }}/release/coast
            strip target/${{ matrix.target }}/release/coastd
          fi

      - name: Package tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARBALL="coast-v${VERSION}-${{ matrix.asset_name }}.tar.gz"
          tar czf "${TARBALL}" \
            -C target/${{ matrix.target }}/release \
            coast coastd
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          echo "TARBALL=${TARBALL}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            coast-v*.tar.gz
            coast-v*.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/coast-v*.tar.gz
            dist/coast-v*.tar.gz.sha256
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

      - name: Notify Discord
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"**coasts ${VERSION}** has been released! 🚀\n\nSee what's new: https://github.com/coast-guard/coasts/releases/tag/${GITHUB_REF_NAME}\"
            }"
